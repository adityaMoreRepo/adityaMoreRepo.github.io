<footer class="footer">
  <!-- ── Divider glow line ──────────────────────────────── -->
  <div class="footer-divider" aria-hidden="true"></div>

  <div class="footer-inner">

    <!-- ── Tagline ─────────────────────────────────────── -->
    <p class="footer-tagline">
      Built with
      <span class="footer-angular">
        <!-- Angular logo mini -->
        <svg width="14" height="14" viewBox="0 0 250 250" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <polygon points="125,3 252,47 220,196 125,248 30,196 0,47" fill="#DD0031"/>
          <polygon points="125,3 125,30 125,248 220,196 252,47" fill="#C3002F"/>
          <path d="M125 30L55 185h26.2l14.1-35.2h59.4L169 185h26z" fill="white"/>
          <path d="M99.6 128.2L125 63.5l25.4 64.7z" fill="white" opacity="0.6"/>
        </svg>
        Angular
      </span>
      &amp; <span class="footer-heart">❤️</span>
    </p>

    <!-- ── Social Icons ────────────────────────────────── -->
    <div class="footer-socials" role="list" aria-label="Social links">
      @for (link of socialLinks; track link.icon) {
        <a
          class="social-icon-btn"
          [href]="link.url"
          target="_blank"
          rel="noopener noreferrer"
          [attr.aria-label]="link.label"
          role="listitem"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
            [innerHTML]="getSvgPath(link.icon)"
            aria-hidden="true"
          ></svg>
          <span class="social-icon-label">{{ link.label }}</span>
        </a>
      }
    </div>

    <!-- ── Copyright ───────────────────────────────────── -->
    <p class="footer-copy">
      &copy; {{ currentYear }} <span class="footer-name gradient-text">{{ name }}</span>. All rights reserved.
    </p>

  </div>
</footer>
